services:
  - type: web
    name: dpngame-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: dpngame-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://dpngame.worldmos.es
      - key: CORS_ORIGIN
        value: https://dpngame.worldmos.es,https://dpngame.worldmos.net,https://dpngame.worldmos.shop,https://dpngame.worldmos.info,https://dpngame.worldmos.online,https://dpngame.worldmos.world,https://dpn-game.vercel.app,http://localhost:5173
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /health

databases:
  - name: dpngame-db
    plan: free
    databaseName: dpngame
    user: dpngame_user
